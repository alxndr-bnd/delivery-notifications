[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [
    "*/migrations/*",
    "venv",
    ".venv",
    "staticfiles",
    "static",
    "landing",
]

[tool.ruff.lint]
# Conservative set for a legacy codebase: pyflakes + key pycodestyle errors.
# Widen as the code is cleaned up.
select = ["E4", "E7", "E9", "F"]
ignore = [
    "E722",  # bare except — present in legacy views
    "F401",  # unused imports — clean up incrementally
]
