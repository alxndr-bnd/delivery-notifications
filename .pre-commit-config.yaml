# Runs checks before every commit. Setup once per clone:  pre-commit install
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: landing-html
        name: landing HTML parses
        entry: python3 -c "import html.parser; html.parser.HTMLParser().feed(open('landing/index.html',encoding='utf-8').read()); print('landing OK')"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: django-check
        name: django system check
        entry: uv run python manage.py check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
