{% load i18n %}{% get_current_language as cur %}<form action="{% url 'set_language' %}" method="post" class="lang-switch">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.path }}">
  <button type="submit" name="language" value="en" class="lang-link{% if cur == 'en' %} is-active{% endif %}">EN</button>
  <button type="submit" name="language" value="sr" class="lang-link{% if cur == 'sr' %} is-active{% endif %}">SR</button>
</form>
