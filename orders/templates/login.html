{% extends 'base.html' %}
{% block title %}Login - Transport1P{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h1 class="h4 mb-3">Login</h1>
    {% if form.errors %}
        <div class="alert alert-danger">Invalid email or password. Please try again.</div>
    {% endif %}
    <form method="post" class="vstack gap-3">
        {% csrf_token %}
        <div>
            <label for="id_username" class="form-label">Email:</label>
            <input type="text" name="username" id="id_username" required class="form-control">
        </div>
        <div>
            <label for="id_password" class="form-label">Password:</label>
            <input type="password" name="password" id="id_password" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="mt-3 mb-0 text-muted">Don't have an account? <a href="{% url 'register_customer' %}">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
