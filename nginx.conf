server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-style fallback: unknown paths serve the landing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for static assets, no-cache for the HTML entry.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
